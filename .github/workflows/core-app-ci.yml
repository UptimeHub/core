name: Core CI/CD

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "core-app/**"
      - "core-api/**"
      - "pom.xml"
      - "Dockerfile"
      - ".github/workflows/core-app-ci.yml"

  pull_request:
    branches:
      - main
      - develop
    paths:
      - "core-app/**"
      - "core-api/**"
      - "pom.xml"
      - "Dockerfile"
      - ".github/workflows/core-app-ci.yml"

permissions:
  contents: read
  packages: write

jobs:
  core-app:
    uses: UptimeHub/infra/.github/workflows/java-service-ci.yml@main
    secrets: inherit
    with:
      java-version: '25'
      working-directory: '.'
      image-name: 'core'
      dockerfile: './Dockerfile'
      docker-context: '.'
      publish-image: ${{ github.event_name == 'push' }}
      deploy: ${{ github.event_name == 'push' }}
      deploy-container-name: 'core'
      deploy-image-name: 'ghcr.io/uptimehub/core'
      deploy-run-options: >-
        --restart unless-stopped
        --network infra_booking-network
        -p 8081:8081
        --env-file /opt/uptimehub/env/core.env
      deploy-healthcheck-url: http://localhost:8081/actuator/health
      deploy-healthcheck-timeout-seconds: 90
