name: Core CI/CD

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "core-app/**"
      - "core-api/**"
      - "pom.xml"
      - "Dockerfile"
      - ".github/workflows/core-app-ci.yml"

  pull_request:
    branches:
      - main
      - develop
    paths:
      - "core-app/**"
      - "core-api/**"
      - "pom.xml"
      - "Dockerfile"
      - ".github/workflows/core-app-ci.yml"

permissions:
  contents: read
  packages: write

jobs:
  core-app:
    uses: UptimeHub/infra/.github/workflows/java-service-ci.yml@main
    with:
      java-version: '25'
      working-directory: '.'
      image-name: 'core'
      dockerfile: './Dockerfile'
      docker-context: '.'
      publish-image: ${{ github.event_name == 'push' }}

