name: Publish Core API

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "core-api/**"
      - "pom.xml"
      - ".github/workflows/core-api-publish.yml"

permissions:
  contents: read
  packages: write

jobs:
  publish-core-api:
    name: Publish Core API
    uses: UptimeHub/infra/.github/workflows/maven-package-publish.yml@main
    with:
      java-version: '25'
      working-directory: '.'
      module: 'core-api'

